[general]
version = "0.3.1"

[problem]
problem_name = "masters2026-quel-a"
objective = "Min"
score_regex = '(?m)^\s*Score\s*=\s*(?P<score>\d+)\s*$'

[test]
start_seed = 0
end_seed = 100
threads = 0
out_dir = "./pahcer/a"

# ==============================
#         COMPILE STEPS
# ==============================

# Compile user's program
[[test.compile_steps]]
program = "g++"
args = ["-O3", "./src/solve_a.cpp", "-o", "./solve_a"]

# On macOS, there’s a possibility of SIGKILL or other issues occurring,
# so it’s better to build the scorer in advance
# rather than running it with cargo run every time.

# Compile the scorer
[[test.compile_steps]]
program = "cargo"
args = ["build", "--release", "--bin", "score"]
current_dir = "../tools"

# Remove the old tester
[[test.compile_steps]]
program = "rm"
args = ["-f", "./score"]

# Move the tester to the current directory
[[test.compile_steps]]
program = "mv"
args = ["../tools/target/release/score", "./score"]

# ==============================
#           TEST STEPS
# ==============================

# Run the user's program
[[test.test_steps]]
program = "./solve_a"
args = []
stdin = "../tools/inA/{SEED04}.txt"
stdout = "../tools/outA/{SEED04}.txt"
stderr = "../tools/errA/{SEED04}.txt"
measure_time = true

# Run the scorer to calculate the score
[[test.test_steps]]
program = "./score"
args = ["../tools/inA/{SEED04}.txt", "../tools/outA/{SEED04}.txt"]
measure_time = false
